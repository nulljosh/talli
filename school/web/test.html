.grade-A{color:#22c55e}.grade-B{color:#a3e635}.grade-Cp{color:#facc15}.grade-C{color:#f59e0b}.grade-Cm{color:#f97316}.grade-F{color:#ef4444}

.review-wrong{background:rgba(239,68,68,0.15);color:#ef4444}

kbd{display:inline-block;background:#1a1a1a;border:1px solid #333;border-radius:3px;padding:1px 5px;font-size:0.65rem;color:#666;font-family:inherit}

.warn-box{background:#171717;border:1px solid #262626;border-radius:8px;padding:16px;margin:16px 0;font-size:0.85rem;color:#a3a3a3}
</style>

<script>
var unitNames={1:'Homeostasis & Biochemistry',2:'Cell Structure & Membrane',3:'DNA, Protein Synthesis & Enzymes',4:'Digestive System',5:'Respiratory System',6:'Circulatory System',7:'Nervous System',8:'Urinary System',9:'Reproductive System'};

{u:1,q:"What are the three components of a homeostatic feedback loop?",opts:["Receptors, control center, effectors","Stimulus, hormone, target organ","Sensor, amplifier, output","Dendrite, axon, synapse"],ans:0},
{u:1,q:"How does negative feedback work?",opts:["The output reverses the original stimulus to maintain normalcy","The output amplifies the original stimulus toward an extreme","The body shuts down all metabolic processes temporarily","Hormones are released in a constant, unchanging rate"],ans:0},
{u:1,q:"Which is an example of positive feedback?",opts:["Blood glucose regulation by insulin","Childbirth contractions amplified by oxytocin","Body temperature regulation by sweating","Blood pressure regulation by baroreceptors"],ans:1},
{u:1,q:"Why are elderly people with poor circulation at greater risk of heatstroke?",opts:["They have higher metabolic rates generating more heat","Poor circulation, damaged skin, and inefficient sweat glands impair heat adjustment","Their hypothalamus no longer detects temperature changes","They produce excess thyroxin which raises body temperature"],ans:1},
{u:1,q:"Why does spraying water on skin in front of a fan lower body temperature?",opts:["The water conducts heat into the air by convection alone","Evaporation is endothermic -- water absorbs body heat as it evaporates, and the fan speeds this up","The fan pushes cold air molecules onto the skin surface","Water blocks infrared radiation from escaping the body"],ans:1},
{u:1,q:"What type of bond holds hydrogen and oxygen atoms WITHIN a water molecule?",opts:["Covalent bond","Hydrogen bond","Ionic bond","Van der Waals forces"],ans:0},
{u:1,q:"What type of bond forms BETWEEN water molecules?",opts:["Covalent bond","Ionic bond","Hydrogen bond","Peptide bond"],ans:2},
{u:1,q:"How many water molecules can hydrogen bond with a single water molecule?",opts:["2","3","4","6"],ans:2},
{u:1,q:"Why is water essential to life?",opts:["It is a universal solvent, moderates temperature, and acts as a lubricant/transport medium","It provides energy directly to cells through hydrolysis","It stores genetic information in its molecular structure","It catalyzes all biochemical reactions without enzymes"],ans:0},
{u:1,q:"What is water intoxication?",opts:["Poisoning from contaminated drinking water","Excessive water dilutes solutes, creating a hypotonic environment that causes cells to swell","Dehydration from drinking saltwater","An allergic reaction to minerals dissolved in water"],ans:1},
{u:1,q:"Which statement about acids and bases is correct?",opts:["Acids release OH- ions; bases release H+ ions","Acids release H+ ions; bases release OH- ions","Both acids and bases release H+ ions","Acids have a pH above 7; bases below 7"],ans:1},
{u:1,q:"The pH scale measures:",opts:["Oxygen concentration in solution","H+ ion concentration on a negative log scale (0-14)","The ratio of water to solute molecules","Electron density around hydrogen atoms"],ans:1},
{u:1,q:"If pH changes from 6 to 4, how much does H+ concentration change?",opts:["2-fold increase","10-fold increase","100-fold increase","1000-fold increase"],ans:2},
{u:1,q:"What is a buffer?",opts:["A molecule that speeds up chemical reactions","A substance that resists changes in pH despite addition of acid or base","A protein that transports ions across membranes","An enzyme that breaks down excess hydrogen ions"],ans:1},
{u:1,q:"What is the approximate pH of blood?",opts:["2.0","5.5","7.4","9.0"],ans:2},
{u:1,q:"What are the 4 major classes of biomolecules?",opts:["Carbohydrates, proteins, lipids, nucleic acids","Glucose, amino acids, fatty acids, DNA","Sugars, enzymes, steroids, chromosomes","Monosaccharides, polypeptides, triglycerides, ribosomes"],ans:0},
{u:1,q:"Dehydration synthesis:",opts:["Breaks polymers by adding water","Bonds monomers by removing water","Dissolves monomers in an acidic solution","Converts lipids into carbohydrates"],ans:1},
{u:1,q:"Hydrolysis:",opts:["Bonds monomers by removing water","Breaks polymers by adding water","Removes oxygen from organic molecules","Converts proteins into nucleic acids"],ans:1},

{u:1,q:"Which is a disaccharide?",opts:["Glucose","Glycogen","Maltose","Cellulose"],ans:2},
{u:1,q:"What is the storage form of glucose in animals?",opts:["Starch","Cellulose","Glycogen","Sucrose"],ans:2},
{u:1,q:"Why is cellulose considered roughage?",opts:["It is too large to be absorbed by the intestine","Humans lack the enzyme to break cellulose bonds, so it passes through as fiber","It contains toxic compounds that the body rejects","Cellulose is a lipid that cannot dissolve in water"],ans:1},
{u:1,q:"What are the 3 major types of lipids?",opts:["Glucose, fructose, galactose","Triglycerides (neutral fats), phospholipids, steroids","Saturated fats, trans fats, omega-3s","Waxes, oils, detergents"],ans:1},
{u:1,q:"How do saturated and unsaturated fatty acids differ?",opts:["Saturated have double bonds; unsaturated have single bonds","Saturated have all single bonds and maximum hydrogen; unsaturated have one or more double bonds","Saturated are liquid at room temperature; unsaturated are solid","Saturated come from plants; unsaturated come from animals"],ans:1},
{u:1,q:"A phospholipid has a hydrophilic ___ and hydrophobic ___.",opts:["Tail; head","Fatty acid chain; sugar group","Phosphate head; fatty acid tails","Steroid ring; glycerol backbone"],ans:2},
{u:1,q:"What is the monomer of proteins?",opts:["Nucleotides","Monosaccharides","Fatty acids","Amino acids"],ans:3},

{u:1,q:"What are the 4 parts of an amino acid?",opts:["Phosphate, sugar, base, hydrogen","Amino group, carboxyl group, hydrogen, R group","Carbon ring, hydroxyl group, methyl group, sulfur","Head group, tail, backbone, side chain"],ans:1},
{u:1,q:"The tertiary structure of a protein refers to its:",opts:["Linear chain of amino acids","Alpha helix pattern","3D globular shape held by multiple bond types","Assembly of multiple polypeptide subunits"],ans:2},
{u:1,q:"What causes protein denaturation?",opts:["Adding more substrate to the enzyme","High temperature or extreme pH destroying the 3D shape","Increasing the concentration of the protein in solution","Binding of the correct substrate to the active site"],ans:1},
{u:1,q:"Keratin and collagen are examples of:",opts:["Enzymes","Structural proteins","Nucleic acids","Lipids"],ans:1},
{u:1,q:"What is the monomer of nucleic acids?",opts:["Amino acids","Monosaccharides","Nucleotides","Fatty acids"],ans:2},
{u:1,q:"A nucleotide consists of:",opts:["Amino group, carboxyl group, R group","Phosphate group, pentose sugar, nitrogenous base","Glycerol, fatty acids, phosphate head","Carbon ring, hydrogen, oxygen"],ans:1},
{u:1,q:"ATP releases energy when:",opts:["A phosphate bond is broken during hydrolysis","It binds to DNA during replication","It gains a fourth phosphate group","It is converted to glucose in the mitochondria"],ans:0},
{u:2,q:"What is a key principle of cell theory?",opts:["All cells arise spontaneously from non-living matter","All cells come from pre-existing cells","Only eukaryotic cells are true living cells","Cells can function without genetic material"],ans:1},
{u:2,q:"How do prokaryotic and eukaryotic cells differ?",opts:["Prokaryotes have a nucleus; eukaryotes do not","Prokaryotes lack a true nucleus and membrane-bound organelles; eukaryotes have both","Eukaryotes are smaller and simpler than prokaryotes","Prokaryotes have mitochondria; eukaryotes do not"],ans:1},

{u:2,q:"Mitochondria:",opts:["Produce lipids for the cell membrane","Convert glucose to ATP","Store genetic information","Package proteins for secretion"],ans:1},
{u:2,q:"Rough ER differs from smooth ER because rough ER:",opts:["Produces lipids and detoxifies drugs","Has ribosomes attached and makes/processes proteins","Is found only in plant cells","Stores calcium ions for muscle contraction"],ans:1},
{u:2,q:"Why do testes, liver, and adrenal glands have extensive smooth ER?",opts:["They need extra protein synthesis capacity","They produce steroids, detoxify substances, or produce steroid hormones respectively","They require large amounts of ATP from glucose metabolism","They store excess glycogen for energy release"],ans:1},
{u:2,q:"Ribosomes function as:",opts:["Energy-producing organelles","Protein factories that catalyze peptide bond formation","Lipid synthesis centers","DNA replication machinery"],ans:1},
{u:2,q:"The Golgi apparatus:",opts:["Produces ATP from glucose","Processes, sorts, and packages proteins for delivery","Replicates DNA before cell division","Breaks down worn-out organelles"],ans:1},
{u:2,q:"Lysosomes contain ___ enzymes that digest ___.",opts:["Oxidative; glucose into ATP","Hydrolytic; food, damaged organelles, and pathogens","Synthetic; amino acids into proteins","Catalytic; DNA into RNA"],ans:1},
{u:2,q:"The nucleolus produces:",opts:["ATP and glucose","mRNA and ribosomal subunits","Lipids and steroids","Lysosomes and peroxisomes"],ans:1},

{u:2,q:"The fluid mosaic model describes the cell membrane as:",opts:["A rigid protein shell surrounding the cell","A semi-fluid phospholipid bilayer with proteins floating within it","A single layer of lipids with embedded carbohydrates","A double layer of proteins with lipids between them"],ans:1},
{u:2,q:"Glycoproteins and glycolipids have carbohydrate chains on the ___ surface of the membrane.",opts:["Inner","Outer","Both inner and outer","Neither -- they are dissolved in the cytoplasm"],ans:1},
{u:2,q:"Intrinsic (integral) proteins:",opts:["Sit loosely on the membrane surface","Span the entire phospholipid bilayer","Are found only in the nucleus","Float freely in the cytoplasm"],ans:1},

{u:2,q:"Which correctly matches substance to transport method?",opts:["Oxygen: active transport","Water: facilitated diffusion","Sodium ions: diffusion only","Glucose: facilitated or active transport"],ans:3},
{u:2,q:"Which factor does NOT increase diffusion rate?",opts:["Greater surface area","Higher temperature","Larger particle size","Steeper concentration gradient"],ans:2},

{u:3,q:"Translation occurs:",opts:["In the nucleus on DNA","In the cytosol on ribosomes","In the mitochondria","In the Golgi apparatus"],ans:1},

var activeUnits=new Set([1,2,3,4,5,6,7,8,9]);
var testQs=[];
var idx=0;
var answers={};
var flags=new Set();
var submitted=false;
var timerStart=0;
var timerInterval=null;

function init(){
  var ctrl=document.getElementById('controls');
  var allBtn=document.createElement('button');
  allBtn.className='unit-btn active';allBtn.textContent='All';allBtn.id='all-btn';
  allBtn.onclick=function(){toggleAll();};ctrl.appendChild(allBtn);
  for(var i=1;i<=9;i++){
    var btn=document.createElement('button');
    btn.className='unit-btn active';btn.textContent='U'+i;btn.id='u-btn-'+i;
    btn.onclick=(function(u){return function(){toggleUnit(u);};})(i);
    ctrl.appendChild(btn);
  }
  updateCount();
}

function toggleAll(){
  if(activeUnits.size===9)activeUnits.clear();else for(var i=1;i<=9;i++)activeUnits.add(i);
  updateBtns();updateCount();
}
function toggleUnit(u){
  if(activeUnits.has(u))activeUnits.delete(u);else activeUnits.add(u);
  updateBtns();updateCount();
}
function updateBtns(){
  document.getElementById('all-btn').className='unit-btn'+(activeUnits.size===9?' active':'');
  for(var i=1;i<=9;i++)document.getElementById('u-btn-'+i).className='unit-btn'+(activeUnits.has(i)?' active':'');
}
function updateCount(){
  var n=allQ.filter(function(q){return activeUnits.has(q.u);}).length;
  document.getElementById('q-count').textContent=n+' questions';
}

function shuffleArr(arr){
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
}

function startTest(){
  testQs=allQ.filter(function(q){return activeUnits.has(q.u);});
  if(testQs.length===0)return;
  shuffleArr(testQs);
  testQs=testQs.map(function(q){
    var indices=[0,1,2,3];
    shuffleArr(indices);
    return{u:q.u,q:q.q,opts:indices.map(function(i){return q.opts[i];}),ans:indices.indexOf(q.ans)};
  });
  answers={};flags=new Set();idx=0;submitted=false;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('test-screen').classList.remove('hidden');
  timerStart=Date.now();
  timerInterval=setInterval(updateTimer,1000);
  renderQ();
}

function updateTimer(){
  var s=Math.floor((Date.now()-timerStart)/1000);
  var m=Math.floor(s/60);var sec=s%60;
  document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function renderQ(){
  if(!testQs.length)return;
  var q=testQs[idx];
  document.getElementById('q-unit').textContent='U'+q.u+': '+unitNames[q.u];
  document.getElementById('q-num').textContent='Question '+(idx+1)+' of '+testQs.length;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('progress').style.width=((idx+1)/testQs.length*100)+'%';
  document.getElementById('q-pos').textContent=(idx+1)+'/'+testQs.length;
  var answered=Object.keys(answers).length;
  document.getElementById('answered-count').textContent=answered+' answered';
  document.getElementById('flag-count').textContent=flags.size?flags.size+' flagged':'';
  var fb=document.getElementById('flag-btn');
  fb.className='flag-btn'+(flags.has(idx)?' flagged':'');
  fb.textContent=flags.has(idx)?'Flagged':'Flag';
  var optDiv=document.getElementById('options');
  optDiv.textContent='';
  var keys=['A','B','C','D'];
  q.opts.forEach(function(o,i){
    var d=document.createElement('div');
    d.className='option';
    if(submitted){
      if(i===q.ans)d.className='option correct';
      else if(answers[idx]===i)d.className='option wrong';
      else d.className='option review-neutral';
    }else if(answers[idx]===i){
      d.className='option selected';
    }
    var keySpan=document.createElement('span');
    keySpan.className='key';keySpan.textContent=keys[i];
    var textSpan=document.createElement('span');
    textSpan.textContent=o;
    d.appendChild(keySpan);d.appendChild(textSpan);
    if(!submitted)d.onclick=function(){selectOpt(i);};
    optDiv.appendChild(d);
  });
  document.getElementById('prev-btn').disabled=idx===0;
  document.getElementById('next-btn').disabled=idx===testQs.length-1;
  var sr=document.getElementById('submit-row');
  if(!submitted){
    sr.classList.remove('hidden');
    var unanswered=testQs.length-Object.keys(answers).length;
    var wb=document.getElementById('warn-box');
    if(unanswered>0||flags.size){
      wb.classList.remove('hidden');
      var parts=[];
      if(unanswered>0)parts.push(unanswered+' unanswered');
      if(flags.size)parts.push(flags.size+' flagged');
      wb.textContent=parts.join(' and ')+' question'+(unanswered+flags.size>1?'s':'');
    }else{
      wb.classList.add('hidden');
    }
  }else{
    sr.classList.add('hidden');
  }
}

function selectOpt(i){if(submitted)return;answers[idx]=i;renderQ();}
function nextQ(){if(idx<testQs.length-1){idx++;renderQ();}}
function prevQ(){if(idx>0){idx--;renderQ();}}
function toggleFlag(){if(flags.has(idx))flags.delete(idx);else flags.add(idx);renderQ();}

function submitTest(){
  submitted=true;
  clearInterval(timerInterval);
  var elapsed=Math.floor((Date.now()-timerStart)/1000);
  var m=Math.floor(elapsed/60);var s=elapsed%60;
  var correct=0;
  testQs.forEach(function(q,i){if(answers[i]===q.ans)correct++;});
  var pct=Math.round(correct/testQs.length*100);
  var grade,gc;
  if(pct>=86){grade='A';gc='grade-A';}
  else if(pct>=73){grade='B';gc='grade-B';}
  else if(pct>=67){grade='C+';gc='grade-Cp';}
  else if(pct>=60){grade='C';gc='grade-C';}
  else if(pct>=50){grade='C-';gc='grade-Cm';}
  else{grade='F';gc='grade-F';}
  document.getElementById('test-screen').classList.add('hidden');
  document.getElementById('results-screen').classList.remove('hidden');
  document.getElementById('kb-hint').classList.add('hidden');
  var gl=document.getElementById('grade-letter');
  gl.textContent=grade;gl.className='grade-big '+gc;
  document.getElementById('grade-pct').textContent=correct+'/'+testQs.length+' ('+pct+'%) -- '+m+'m '+s+'s';

  var unitStats={};
  testQs.forEach(function(q,i){
    if(!unitStats[q.u])unitStats[q.u]={total:0,correct:0};
    unitStats[q.u].total++;
    if(answers[i]===q.ans)unitStats[q.u].correct++;
  });
  var usd=document.getElementById('unit-scores');
  usd.textContent='';
  for(var u=1;u<=9;u++){
    if(!unitStats[u])continue;
    var st=unitStats[u];
    var up=Math.round(st.correct/st.total*100);
    var color=up>=86?'#22c55e':up>=73?'#a3e635':up>=60?'#f59e0b':'#ef4444';
    var row=document.createElement('div');row.className='unit-row';
    var label=document.createElement('span');label.className='label';label.textContent='U'+u;
    var barWrap=document.createElement('div');barWrap.className='bar-wrap';
    var barFill=document.createElement('div');barFill.className='bar-fill';
    barFill.style.width=up+'%';barFill.style.background=color;
    barWrap.appendChild(barFill);
    var score=document.createElement('span');score.className='score';score.textContent=st.correct+'/'+st.total+' ('+up+'%)';
    row.appendChild(label);row.appendChild(barWrap);row.appendChild(score);
    usd.appendChild(row);
  }

  var rl=document.getElementById('review-list');
  rl.textContent='';
  testQs.forEach(function(q,i){
    var isCorrect=answers[i]===q.ans;
    var isSkipped=answers[i]===undefined;
    var card=document.createElement('div');
    card.className='question-card';card.style.marginBottom='12px';
    var unitDiv=document.createElement('div');unitDiv.className='q-unit';
    unitDiv.textContent='U'+q.u+': '+unitNames[q.u];
    var topRow=document.createElement('div');
    topRow.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
    var numDiv=document.createElement('div');numDiv.className='q-num';numDiv.textContent='Question '+(i+1);
    var tag=document.createElement('span');
    tag.className='review-tag '+(isCorrect?'review-correct':isSkipped?'review-skip':'review-wrong');
    tag.textContent=isCorrect?'Correct':isSkipped?'Skipped':'Wrong';
    topRow.appendChild(numDiv);topRow.appendChild(tag);
    var qText=document.createElement('div');qText.className='q-text';qText.textContent=q.q;
    var optsDiv=document.createElement('div');optsDiv.className='options';
    var keys=['A','B','C','D'];
    q.opts.forEach(function(o,j){
      var d=document.createElement('div');
      d.className='option review-neutral';d.style.cursor='default';
      if(j===q.ans)d.className='option correct';
      else if(answers[i]===j)d.className='option wrong';
      var ks=document.createElement('span');ks.className='key';ks.textContent=keys[j];
      var ts=document.createElement('span');ts.textContent=o;
      d.appendChild(ks);d.appendChild(ts);
      optsDiv.appendChild(d);
    });
    card.appendChild(unitDiv);card.appendChild(topRow);card.appendChild(qText);card.appendChild(optsDiv);
    rl.appendChild(card);
  });

  var missed=testQs.filter(function(_,i){return answers[i]!==testQs[i].ans;});
  document.getElementById('retry-btn').style.display=missed.length?'':'none';
}

function retryMissed(){
  var missed=testQs.filter(function(_,i){return answers[i]!==testQs[i].ans;});
  if(!missed.length)return;
  testQs=missed;
  shuffleArr(testQs);
  testQs=testQs.map(function(q){
    var indices=[0,1,2,3];
    shuffleArr(indices);
    return{u:q.u,q:q.q,opts:indices.map(function(i){return q.opts[i];}),ans:indices.indexOf(q.ans)};
  });
  answers={};flags=new Set();idx=0;submitted=false;
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('test-screen').classList.remove('hidden');
  document.getElementById('kb-hint').classList.remove('hidden');
  timerStart=Date.now();
  timerInterval=setInterval(updateTimer,1000);
  renderQ();
}

document.addEventListener('keydown',function(e){
  if(submitted)return;
  if(document.getElementById('test-screen').classList.contains('hidden'))return;
  if(e.key==='ArrowRight')nextQ();
  else if(e.key==='ArrowLeft')prevQ();
  else if(e.key==='1'||e.key==='a'||e.key==='A')selectOpt(0);
  else if(e.key==='2'||e.key==='b'||e.key==='B')selectOpt(1);
  else if(e.key==='3'||e.key==='c'||e.key==='C')selectOpt(2);
  else if(e.key==='4'||e.key==='d'||e.key==='D')selectOpt(3);
  else if(e.key==='f'||e.key==='F')toggleFlag();
  else if(e.key==='Enter'){
    if(idx===testQs.length-1&&Object.keys(answers).length===testQs.length)submitTest();
  }
});

init();
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1612" rx="36"/>
  <!-- ledger line -->
  <line x1="38" y1="133" x2="162" y2="133" stroke="rgba(255,133,27,0.14)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- group 1: four verticals -->
  <line x1="50" y1="68" x2="50" y2="130" stroke="#FF851B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="63" y1="65" x2="63" y2="132" stroke="#FF851B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="76" y1="70" x2="76" y2="128" stroke="#FF851B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="89" y1="66" x2="89" y2="131" stroke="#FF851B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- group 1: diagonal cross -->
  <line x1="41" y1="125" x2="98" y2="72" stroke="#FF851B" stroke-width="3" stroke-linecap="round"/>
  <!-- group 2: three verticals (partial) -->
  <line x1="113" y1="70" x2="113" y2="130" stroke="#FF851B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="126" y1="67" x2="126" y2="132" stroke="#FF851B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="139" y1="71" x2="139" y2="129" stroke="#FF851B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- count label: faint "8" right edge -->
  <text x="158" y="131" font-family="monospace" font-size="11" fill="rgba(255,133,27,0.22)" text-anchor="end">8</text>
  <!-- subtle top rule -->
  <line x1="38" y1="60" x2="162" y2="60" stroke="rgba(255,133,27,0.07)" stroke-width="1"/>
</svg>

name: TalliMac
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    macOS: "14.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  TalliMac:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "*.md"
          - "*.app"
          - "*.pkg"
          - ".asc"
          - "fastlane"
          - UITests-mac
    settings:
      base:
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Talli
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.mac
        PRODUCT_NAME: Talli
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Talli.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - target: TalliWidgets
  TalliWidgets:
    type: app-extension
    platform: macOS
    sources:
      - path: ../widgets-macos
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.mac.widgets
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Talli Widgets
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_STYLE: Automatic
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: TalliWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.jt.talli
  TalliMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests-mac
    dependencies:
      - target: TalliMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.mac.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TalliMac:
    build:
      targets:
        TalliMac: all
        TalliWidgets: all
    run:
      config: Debug
    archive:
      config: Release
    shared: true
  TalliMacUITests:
    build:
      targets:
        TalliMac: all
        TalliMacUITests: all
    test:
      targets:
        - TalliMacUITests
    shared: true

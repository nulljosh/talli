name: Talli
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
attributes:
  LastUpgradeCheck: "2650"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "2.4.4"
  CURRENT_PROJECT_VERSION: "6"
targets:
  Talli:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - UITests
          - Tests
          - fastlane
          - build
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
  TalliTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Talli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.tests
        GENERATE_INFOPLIST_FILE: YES
  TalliUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Talli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Talli:
    build:
      targets:
        Talli: all
        TalliTests: [test]
        TalliUITests: [test]
    run:
      config: Debug
    archive:
      config: Release
    test:
      targets:
        - TalliTests
    shared: true
  TalliUITests:
    build:
      targets:
        Talli: all
        TalliUITests: all
    test:
      targets:
        - TalliUITests
    shared: true

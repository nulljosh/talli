name: Talli
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "2.4.1"
  CURRENT_PROJECT_VERSION: "5"
targets:
  Talli:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - UITests
          - Tests
          - fastlane
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally
  TalliTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Talli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.tests
        GENERATE_INFOPLIST_FILE: YES
  TalliUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Talli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  TalliUITests:
    build:
      targets:
        Talli: all
        TalliUITests: all
    test:
      targets:
        - TalliUITests
    shared: true

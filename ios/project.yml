name: Talli
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
attributes:
  LastUpgradeCheck: "2650"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "2.4.4"
  CURRENT_PROJECT_VERSION: "6"
targets:
  Talli:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - UITests
          - Tests
          - fastlane
          - build
          - .asc
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    entitlements:
      path: Talli.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jt.talli
    dependencies:
      - target: TalliWidgetsExtension
  TalliWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ../widgets-ios
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - "*.md"
          - "*.svg"
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Talli Widgets
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 Joshua Trommel"
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.widgets
      ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
      PRODUCT_NAME: TalliWidgets
      CODE_SIGN_STYLE: Automatic
    entitlements:
      path: ../widgets-ios/TalliWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jt.talli
  TalliTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Talli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.tests
        GENERATE_INFOPLIST_FILE: YES
  TalliUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: Talli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.tally.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Talli:
    build:
      targets:
        Talli: all
        TalliTests: [test]
        TalliUITests: [test]
    run:
      config: Debug
    archive:
      config: Release
    test:
      targets:
        - TalliTests
    shared: true
  TalliUITests:
    build:
      targets:
        Talli: all
        TalliUITests: all
    test:
      targets:
        - TalliUITests
    shared: true

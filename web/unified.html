<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <title>Tally</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes countUp   { from { opacity:0; transform:translateY(14px) scale(0.94); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes fadeUp    { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
    @keyframes pulseRing { 0% { box-shadow:0 0 0 0 var(--pc,rgba(255,255,255,0.2)); } 60% { box-shadow:0 0 0 6px transparent; } 100% { box-shadow:0 0 0 0 transparent; } }
    @keyframes urgentBlink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
    @keyframes breathe   { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(0.7); opacity:0.45; } }
    @keyframes shimmer   { 0% { background-position:-400px 0; } 100% { background-position:400px 0; } }
    @keyframes slideInLeft  { from { opacity:0; transform:translateX( 32px); } to { opacity:1; transform:translateX(0); } }
    @keyframes slideInRight { from { opacity:0; transform:translateX(-32px); } to { opacity:1; transform:translateX(0); } }
  </style>
</head>
<body>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function tk(dark) {
  return dark ? {
    bg:'#0a0a0a', bg2:'#141414', bg3:'#1c1c1c',
    text:'#f5f5f5', muted:'rgba(255,255,255,0.32)', mutedMid:'rgba(255,255,255,0.52)',
    border:'rgba(255,255,255,0.07)', border2:'rgba(255,255,255,0.12)',
    tabBar:'rgba(8,8,8,0.95)', success:'#30d158', warning:'#ff9f0a', error:'#ff453a',
  } : {
    bg:'#f9f9f9', bg2:'#f2f2f2', bg3:'#e8e8e8',
    text:'#171717', muted:'rgba(0,0,0,0.30)', mutedMid:'rgba(0,0,0,0.50)',
    border:'rgba(0,0,0,0.07)', border2:'rgba(0,0,0,0.13)',
    tabBar:'rgba(249,249,249,0.95)', success:'#34c759', warning:'#ff9500', error:'#ff3b30',
  };
}

function visibilityInterval(fn, ms) {
  let id = setInterval(() => { if (!document.hidden) fn(); }, ms);
  return () => clearInterval(id);
}

const MON = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};

function parseMsgDate(str) {
  const m = str.match(/(\d{4})\s*\/\s*([A-Z]{3})\s*\/\s*(\d{2})/);
  if (!m) return '';
  return new Date(+m[1], MON[m[2]], +m[3]).toLocaleDateString('en-CA', {month:'short', day:'numeric'});
}

function parseMessages(sections) {
  const SPAM = new Set(['Home','Payment Info','Messages','Notifications','Service Requests','Monthly Reports','Sign out','Profile','Back','Print','Help']);
  const DATE_RE = /\d{4}\s*\/\s*[A-Z]{3}\s*\/\s*\d{2}/;
  const combined = [...(sections['Messages']?.allText||[]), ...(sections['Notifications']?.allText||[])]
    .filter(t => t && t.trim().length > 3 && !SPAM.has(t.trim()));
  const msgs = []; let cur = null;
  combined.forEach((line, i) => {
    if (DATE_RE.test(line)) { if (cur) { cur.date = parseMsgDate(line); msgs.push(cur); cur = null; } }
    else if (!cur) cur = { id:i, title:line.trim(), body:'', date:'', unread:true };
    else if (!cur.body) cur.body = line.trim();
  });
  if (cur) msgs.push(cur);
  return msgs.slice(0, 12);
}

function parseDollar(s) { return parseFloat((s||'').replace(/[^0-9.]/g,'')) || 0; }

const PAST_PAYMENTS = [
  {year:2026,month:2,day:28,amount:'$1,700'},{year:2026,month:1,day:28,amount:'$1,700'},
  {year:2026,month:0,day:28,amount:'$1,658'},{year:2025,month:11,day:28,amount:'$1,658'},
  {year:2025,month:10,day:28,amount:'$1,658'},
];

function useCountUp(target, ms=750) {
  const [v, setV] = useState(0);
  const raf = useRef();
  useEffect(() => {
    if (!target) return;
    const t0 = performance.now();
    const run = (now) => { const p = Math.min((now-t0)/ms,1); setV(target*(1-Math.pow(1-p,4))); if(p<1) raf.current=requestAnimationFrame(run); };
    raf.current = requestAnimationFrame(run);
    return () => cancelAnimationFrame(raf.current);
  }, [target, ms]);
  return v;
}

function Skel({w, h=16, r=4, dark}) {
  const t = tk(dark);
  return <div style={{width:w,height:h,borderRadius:r,background:`linear-gradient(90deg,${t.bg2} 25%,${t.bg3} 50%,${t.bg2} 75%)`,backgroundSize:'800px 100%',animation:'shimmer 1.4s ease-in-out infinite'}} />;
}

const Icon = {
  home:(c,f)=><svg width="22" height="22" viewBox="0 0 24 24" fill={f?c:'none'} stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1v-9.5z"/></svg>,
  calendar:(c,f)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="3" fill={f?c:'none'} fillOpacity={f?.15:0}/><path d="M3 9h18M8 2v4M16 2v4"/></svg>,
  status:(c)=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="1.7" strokeLinecap="round"><circle cx="6" cy="6" r="2" fill={c} stroke="none"/><circle cx="6" cy="12" r="2" fill={c} stroke="none"/><circle cx="6" cy="18" r="2" stroke={c} strokeWidth="1.7"/><path d="M10 6h9M10 12h9M10 18h9" strokeLinecap="round"/></svg>,
  messages:(c,f)=><svg width="22" height="22" viewBox="0 0 24 24" fill={f?c:'none'} stroke={c} strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" fillOpacity={f?.15:0}/></svg>,
};

function TabBar({tab, setTab, dark, msgBadge}) {
  const t = tk(dark);
  const TABS = [
    {id:'home',label:'Home',icon:Icon.home},
    {id:'calendar',label:'Calendar',icon:Icon.calendar},
    {id:'status',label:'Status',icon:(c,f)=>Icon.status(c)},
    {id:'messages',label:'Messages',icon:Icon.messages,badge:msgBadge},
  ];
  return (
    <div style={{display:'flex',flexShrink:0,background:t.tabBar,borderTop:`0.5px solid ${t.border}`,backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',paddingBottom:'max(env(safe-area-inset-bottom,0px),16px)'}}>
      {TABS.map(({id,label,icon,badge})=>{
        const active=tab===id; const color=active?t.text:t.muted;
        return (
          <button key={id} onClick={()=>setTab(id)} style={{flex:1,background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'10px 0 0',position:'relative',WebkitTapHighlightColor:'transparent'}}>
            <div style={{transition:'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)',transform:active?'scale(1.08)':'scale(1)'}}>
              {icon(color, active)}
            </div>
            <span style={{fontSize:10,fontWeight:active?600:400,color,letterSpacing:'0.01em',transition:'color 0.15s'}}>{label}</span>
            {badge>0&&<div style={{position:'absolute',top:6,left:'50%',marginLeft:6,background:t.error,color:'#fff',fontSize:9,fontWeight:700,width:14,height:14,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center'}}>{badge}</div>}
          </button>
        );
      })}
    </div>
  );
}

function HomeTab({dark, amount, daysUntil, paymentDate, paid, onPaidChange}) {
  const t = tk(dark);
  const [loaded, setLoaded] = useState(false);
  const [bounce, setBounce] = useState(false);
  useEffect(() => {
    if (amount !== null && daysUntil !== null) { const id=setTimeout(()=>setLoaded(true),300); return ()=>clearTimeout(id); }
  }, [amount, daysUntil]);
  const counted   = useCountUp(loaded ? parseDollar(amount) : 0, 750);
  const formatted = '$' + Math.round(counted).toLocaleString('en-CA');
  const urgent    = daysUntil !== null && daysUntil <= 3;
  const isToday   = daysUntil === 0;
  const pct       = daysUntil !== null ? Math.max(0, Math.min(100, ((28-daysUntil)/28)*100)) : 0;
  const handlePaid = () => { setBounce(true); setTimeout(()=>setBounce(false),350); onPaidChange(!paid); };
  if (!loaded) return (
    <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 28px',gap:16}}>
      <Skel w={80} h={11} dark={dark}/><Skel w="100%" h={72} r={6} dark={dark}/>
      <Skel w={160} h={34} r={4} dark={dark}/><Skel w={100} h={18} dark={dark}/>
      <div style={{marginTop:8}}><Skel w="100%" h={2} r={2} dark={dark}/></div>
      <Skel w={120} h={30} r={100} dark={dark}/>
    </div>
  );
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 28px',animation:'fadeIn 0.3s ease both'}}>
      <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:t.muted,marginBottom:14,animation:'fadeUp 0.45s ease both'}}>Next payment</div>
      <div style={{fontSize:80,fontWeight:700,letterSpacing:'-5px',lineHeight:0.92,color:t.text,opacity:paid?.28:1,transition:'opacity 0.35s ease',textDecoration:paid?'line-through':'none',textDecorationColor:t.muted,animation:'countUp 0.65s cubic-bezier(0.22,1,0.36,1) both'}}>
        {formatted}
      </div>
      <div style={{marginTop:20,display:'flex',alignItems:'center',gap:10,animation:'fadeUp 0.45s 0.1s ease both'}}>
        {(urgent||isToday)&&<div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,background:isToday?t.success:t.warning,animation:isToday?'pulseRing 1.8s ease-out infinite':'urgentBlink 0.9s ease-in-out infinite','--pc':isToday?'rgba(52,199,89,0.3)':'rgba(255,149,0,0.3)'}}/>}
        <span style={{fontSize:36,fontWeight:600,letterSpacing:'-1.5px',lineHeight:1,color:isToday?t.success:urgent?t.warning:t.text,transition:'color 0.3s'}}>
          {isToday?'today':`in ${daysUntil} day${daysUntil!==1?'s':''}`}
        </span>
      </div>
      <div style={{marginTop:7,fontSize:17,color:t.mutedMid,fontWeight:400,letterSpacing:'-0.3px',animation:'fadeUp 0.45s 0.18s ease both'}}>{paymentDate}</div>
      <div style={{marginTop:34,animation:'fadeUp 0.45s 0.26s ease both'}}>
        <div style={{height:1.5,background:t.border,borderRadius:2,position:'relative'}}>
          <div style={{position:'absolute',left:0,top:0,height:'100%',borderRadius:2,width:`${pct}%`,background:urgent?t.warning:t.text,transition:'width 1.1s cubic-bezier(0.4,0,0.2,1)'}}/>
          <div style={{position:'absolute',right:-3,top:-3,width:7,height:7,borderRadius:'50%',background:urgent?t.warning:t.text,animation:'pulseRing 2.5s ease-out infinite','--pc':urgent?'rgba(255,149,0,0.3)':dark?'rgba(245,245,245,0.15)':'rgba(23,23,23,0.15)'}}/>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:7}}>
          <span style={{fontSize:11,color:t.muted}}>last payment</span>
          <span style={{fontSize:11,color:urgent?t.warning:t.muted,fontWeight:urgent?600:400}}>{isToday?'today':`${daysUntil}d`}</span>
        </div>
      </div>
      <div style={{marginTop:28,animation:'fadeUp 0.45s 0.34s ease both'}}>
        <button onClick={handlePaid} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 14px',borderRadius:100,border:`1px solid ${paid?t.success:t.border}`,background:'none',cursor:'pointer',fontSize:13,fontWeight:500,color:paid?t.success:t.muted,fontFamily:'inherit',transform:bounce?'scale(1.15)':'scale(1)',transition:'transform 0.3s cubic-bezier(0.34,1.56,0.64,1),border-color 0.2s,color 0.2s',WebkitTapHighlightColor:'transparent'}}>
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            {paid?<><circle cx="7" cy="7" r="6.5" stroke="currentColor"/><path d="M4 7l2 2 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></>:<circle cx="7" cy="7" r="6.5" stroke="currentColor" strokeDasharray="2 2"/>}
          </svg>
          {paid?'Marked as paid':'Mark as paid'}
        </button>
      </div>
    </div>
  );
}

function CalendarTab({dark, payDateObj, amount}) {
  const t = tk(dark);
  const today = new Date(); today.setHours(0,0,0,0);
  const nextPayment = payDateObj || new Date(today.getFullYear(), today.getMonth(), 28);
  const [viewMonth, setViewMonth] = useState(new Date(nextPayment.getFullYear(), nextPayment.getMonth(), 1));
  const [dir, setDir]   = useState(null);
  const [animKey, setAnimKey] = useState(0);
  const [selected, setSelected] = useState(null);
  const go = (d) => { setDir(d>0?'left':'right'); setAnimKey(k=>k+1); setViewMonth(m=>new Date(m.getFullYear(),m.getMonth()+d,1)); setSelected(null); };
  const year=viewMonth.getFullYear(), month=viewMonth.getMonth();
  const name=viewMonth.toLocaleString('en-CA',{month:'long',year:'numeric'});
  const firstDay=new Date(year,month,1).getDay(), daysInMonth=new Date(year,month+1,0).getDate();
  const cells=[]; for(let i=0;i<firstDay;i++)cells.push(null); for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const isToday_=(d)=>d&&new Date(year,month,d).toDateString()===today.toDateString();
  const isNextPay=(d)=>d&&new Date(year,month,d).getTime()===nextPayment.getTime();
  const pastPay=(d)=>d?PAST_PAYMENTS.find(p=>p.year===year&&p.month===month&&p.day===d):null;
  const isPast=(d)=>d&&new Date(year,month,d)<today;
  const animStyle=dir?{animation:`${dir==='left'?'slideInLeft':'slideInRight'} 0.28s cubic-bezier(0.4,0,0.2,1) both`}:{animation:'fadeIn 0.25s ease both'};
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',padding:'16px 20px 12px',flexShrink:0}}>
        <button onClick={()=>go(-1)} style={{background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:t.muted,fontFamily:'inherit',fontSize:20,lineHeight:1,WebkitTapHighlightColor:'transparent'}}>‹</button>
        <div style={{flex:1,textAlign:'center',fontSize:15,fontWeight:600,letterSpacing:'-0.3px',color:t.text}}>{name}</div>
        <button onClick={()=>go(1)}  style={{background:'none',border:'none',cursor:'pointer',padding:'4px 8px',color:t.muted,fontFamily:'inherit',fontSize:20,lineHeight:1,WebkitTapHighlightColor:'transparent'}}>›</button>
      </div>
      <div key={animKey} style={{flex:1,overflowY:'auto',padding:'0 16px',...animStyle}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',textAlign:'center',marginBottom:4}}>
          {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} style={{fontSize:11,fontWeight:600,color:t.muted,padding:'0 0 6px'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px 0'}}>
          {cells.map((d,i)=>{
            const next=isNextPay(d),past=pastPay(d),tod=isToday_(d),isP=isPast(d),sel=selected===i;
            return (
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'center',height:38}}>
                <button onClick={()=>setSelected(sel?null:(past||next?i:null))} style={{width:32,height:32,borderRadius:'50%',cursor:(past||next)?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:1,background:next?t.text:sel?t.bg3:'transparent',border:tod&&!next?`1px solid ${t.border2}`:'none',outline:'none',position:'relative',animation:next?'pulseRing 2.5s ease-out infinite':'none','--pc':dark?'rgba(245,245,245,0.12)':'rgba(23,23,23,0.12)',transition:'background 0.15s',WebkitTapHighlightColor:'transparent'}}>
                  <span style={{fontSize:13,fontWeight:(next||past)?600:400,lineHeight:1,color:d===null?'transparent':next?t.bg:isP&&!past?t.muted:t.text,opacity:d===null?0:isP&&!past?0.28:1}}>{d}</span>
                  {past&&<div style={{width:4,height:4,borderRadius:'50%',background:next?t.bg:t.text,opacity:0.5,position:'absolute',bottom:4}}/>}
                </button>
              </div>
            );
          })}
        </div>
        {selected!==null&&(()=>{
          const d=cells[selected],next=isNextPay(d),past=pastPay(d);
          if(!next&&!past)return null;
          return <div style={{margin:'16px 0 0',padding:'12px 14px',background:t.bg2,borderRadius:8,border:`1px solid ${t.border}`,animation:'fadeUp 0.2s ease both'}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:t.muted,marginBottom:6}}>{next?'Upcoming':'Received'}</div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
              <span style={{fontSize:22,fontWeight:700,letterSpacing:'-1px',color:t.text}}>{next?(amount||'$1,700'):past.amount}</span>
              <span style={{fontSize:13,color:t.muted}}>{viewMonth.toLocaleString('en-CA',{month:'short'})} {d}</span>
            </div>
          </div>;
        })()}
        <div style={{display:'flex',gap:18,padding:'20px 0 4px'}}>
          {[{fill:true,small:false,label:'Payment day'},{fill:false,small:false,label:'Today'},{fill:true,small:true,label:'Past payment'}].map(({fill,small,label},i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:5}}>
              <div style={{width:small?5:9,height:small?5:9,borderRadius:'50%',flexShrink:0,background:fill?t.text:'transparent',border:fill?'none':`1px solid ${t.border2}`,opacity:small?.5:1}}/>
              <span style={{fontSize:10,color:t.muted}}>{label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function StatusTab({dark, pwdApproved}) {
  const t = tk(dark);
  const steps = [
    {label:'Application submitted',date:'Jan 14, 2026',done:true},
    {label:'Medical review',date:pwdApproved?'Complete':'In progress',done:pwdApproved,current:!pwdApproved},
    {label:'Ministry decision',date:pwdApproved?'Approved':'Est. Jul 2026',done:pwdApproved},
    {label:'Backdated payments',date:pwdApproved?'Issued':'Upon approval',done:pwdApproved},
  ];
  const upcoming=[
    {label:'Monthly report due',date:'May 5',warn:true},
    {label:'PharmaCare renewal',date:'Jun 1'},
    {label:'T4 slip available',date:'Feb 2027'},
  ];
  return (
    <div style={{flex:1,overflowY:'auto',padding:'20px 24px 0',animation:'fadeIn 0.2s ease both'}}>
      <div style={{marginBottom:28}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:t.muted,marginBottom:16}}>PWD Application</div>
        <div style={{borderLeft:`1.5px solid ${t.border}`,marginLeft:5,paddingLeft:18}}>
          {steps.map((s,i)=>(
            <div key={i} style={{position:'relative',paddingBottom:i<steps.length-1?22:0}}>
              <div style={{position:'absolute',left:-24,top:4,width:10,height:10,borderRadius:'50%',background:(s.done||s.current)?t.text:t.bg3,border:`2px solid ${t.bg}`,animation:s.current?'breathe 2.2s ease-in-out infinite':'none'}}/>
              <div style={{fontSize:14,fontWeight:s.current?600:400,color:s.done?t.mutedMid:t.text,letterSpacing:'-0.2px',textDecoration:s.done?'line-through':'none',textDecorationColor:t.border2}}>{s.label}</div>
              <div style={{fontSize:12,marginTop:2,color:s.current?t.warning:t.muted,fontWeight:s.current?500:400}}>{s.date}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{height:1,background:t.border,marginBottom:24}}/>
      <div>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:t.muted,marginBottom:14}}>Upcoming</div>
        {upcoming.map((item,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:i<upcoming.length-1?`1px solid ${t.border}`:'none'}}>
            <span style={{fontSize:14,color:t.text,letterSpacing:'-0.2px'}}>{item.label}</span>
            <span style={{fontSize:12,fontWeight:item.warn?600:400,color:item.warn?t.warning:t.muted,background:item.warn?`${t.warning}18`:'transparent',padding:item.warn?'2px 8px':'0',borderRadius:100}}>{item.date}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function MessagesTab({dark, messages}) {
  const t = tk(dark);
  const [read, setRead]     = useState({});
  const [expanded, setExpanded] = useState(null);
  const toggle = (id) => { setExpanded(e=>e===id?null:id); setRead(r=>({...r,[id]:true})); };
  const msgs = messages.length>0 ? messages : [{id:0,title:'No messages yet',body:'Messages from BC Self-Serve will appear here.',date:'',unread:false}];
  return (
    <div style={{flex:1,overflowY:'auto',animation:'fadeIn 0.2s ease both'}}>
      <div style={{fontSize:10,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:t.muted,padding:'20px 24px 12px'}}>Messages</div>
      {msgs.map((m,i)=>{
        const isRead=read[m.id]||!m.unread, isOpen=expanded===m.id;
        return (
          <div key={m.id} onClick={()=>toggle(m.id)} style={{padding:'12px 24px',borderBottom:i<msgs.length-1?`1px solid ${t.border}`:'none',cursor:'pointer',transition:'background 0.15s',background:isOpen?t.bg2:'transparent',WebkitTapHighlightColor:'transparent'}}>
            <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,marginTop:5,background:isRead?'transparent':t.text,border:isRead?`1px solid ${t.border2}`:'none',transition:'background 0.2s'}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8}}>
                  <span style={{fontSize:14,fontWeight:isRead?400:600,color:t.text,letterSpacing:'-0.2px',flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.title}</span>
                  {m.date&&<span style={{fontSize:11,color:t.muted,flexShrink:0}}>{m.date}</span>}
                </div>
                {isOpen&&m.body&&<div style={{marginTop:6,fontSize:13,color:t.mutedMid,lineHeight:1.5,animation:'fadeUp 0.2s ease both'}}>{m.body}</div>}
                {!isOpen&&m.body&&<div style={{marginTop:2,fontSize:12,color:t.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{m.body}</div>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

const TAB_ORDER = ['home','calendar','status','messages'];

function Screen({dark, amount, daysUntil, paymentDate, payDateObj, paid, onPaidChange, messages, pwdApproved, username, onLogout}) {
  const t = tk(dark);
  const [tab, setTab] = useState('home');
  const touchX = useRef(null);
  const onTouchStart = (e) => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd   = (e) => {
    if (touchX.current===null) return;
    const dx = e.changedTouches[0].clientX - touchX.current; touchX.current=null;
    if (Math.abs(dx)<40) return;
    const idx=TAB_ORDER.indexOf(tab);
    if (dx<0&&idx<TAB_ORDER.length-1) setTab(TAB_ORDER[idx+1]);
    if (dx>0&&idx>0) setTab(TAB_ORDER[idx-1]);
  };
  const unread = messages.filter(m=>m.unread).length;
  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:t.bg,color:t.text}} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <div style={{height:'max(env(safe-area-inset-top,0px),0px)',flexShrink:0}}/>
      <div style={{padding:'12px 24px 0',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:13,fontWeight:600,letterSpacing:'-0.01em',color:t.muted}}>tally</span>
        <button onClick={onLogout} style={{background:'none',border:'none',cursor:'pointer',padding:0,fontSize:12,color:t.muted,fontFamily:'inherit',WebkitTapHighlightColor:'transparent'}}>{username||'logout'}</button>
      </div>
      {tab==='home'     &&<HomeTab     dark={dark} amount={amount} daysUntil={daysUntil} paymentDate={paymentDate} paid={paid} onPaidChange={onPaidChange}/>}
      {tab==='calendar' &&<CalendarTab dark={dark} payDateObj={payDateObj} amount={amount}/>}
      {tab==='status'   &&<StatusTab   dark={dark} pwdApproved={pwdApproved}/>}
      {tab==='messages' &&<MessagesTab dark={dark} messages={messages}/>}
      <TabBar tab={tab} setTab={setTab} dark={dark} msgBadge={unread}/>
    </div>
  );
}

function App() {
  const [dark,        setDark]        = useState(window.matchMedia('(prefers-color-scheme: dark)').matches);
  const [username,    setUsername]    = useState('');
  const [amount,      setAmount]      = useState(null);
  const [daysUntil,   setDaysUntil]   = useState(null);
  const [paymentDate, setPaymentDate] = useState('');
  const [payDateObj,  setPayDateObj]  = useState(null);
  const [paidMonths,  setPaidMonths]  = useState({});
  const [messages,    setMessages]    = useState([]);
  const [pwdApproved, setPwdApproved] = useState(false);

  const loadData = useCallback(async () => {
    try {
      const r = await fetch('/api/latest', {credentials:'include'});
      if (r.status===401) { location.href='/login.html'; return; }
      if (!r.ok) return;
      const json = await r.json();
      const sections = json.data?.sections || json.sections || {};
      const pi  = sections['Payment Info'] || {};
      const raw = [...(pi.tableData||[]), ...(pi.allText||[])].join('\n');
      const amtMatch = raw.match(/Amount:\s*(\$[\d,]+)(?:\.\d{2})?/);
      setAmount(amtMatch ? amtMatch[1] : (prev => prev ?? '$1,700'));
      const dm = raw.match(/(\d{4})\s*\/\s*([A-Z]{3})\s*\/\s*(\d{2})/);
      if (dm) {
        const d = new Date(+dm[1], MON[dm[2]], +dm[3]);
        setPayDateObj(d);
        const now = new Date(); now.setHours(0,0,0,0);
        setDaysUntil(Math.max(0, Math.ceil((d-now)/86400000)));
        setPaymentDate(d.toLocaleDateString('en-CA', {weekday:'short',month:'short',day:'numeric'}));
      } else { setDaysUntil(v => v ?? 0); }
      setMessages(parseMessages(sections));
      setPwdApproved(json.uiConfig?.pwdApproved||false);
    } catch(e) { setAmount(v=>v??'$0'); setDaysUntil(v=>v??0); }
  }, []);

  useEffect(() => {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const mqH = e => setDark(e.matches);
    mq.addEventListener('change', mqH);
    fetch('/api/me', {credentials:'include'})
      .then(r=>{ if(!r.ok)throw new Error(); return r.json(); })
      .then(d=>{ if(!d.authenticated){location.href='/login.html';return;} setUsername(d.username); loadData(); fetch('/api/paid-status',{credentials:'include'}).then(r=>r.json()).then(d=>setPaidMonths(d.paidMonths||{})).catch(()=>{}); })
      .catch(()=>{ location.href='/login.html'; });
    const clearPoll = visibilityInterval(loadData, 120000);
    if ('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js',{scope:'/'}).catch(console.error));
    return () => { mq.removeEventListener('change',mqH); clearPoll(); };
  }, [loadData]);

  const now      = new Date();
  const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const paid     = !!paidMonths[monthKey];

  const handlePaidChange = async (newPaid) => {
    setPaidMonths(prev=>({...prev,[monthKey]:newPaid?Date.now():null}));
    try { await fetch('/api/paid-status',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({month:monthKey,paid:newPaid})}); } catch(e){}
  };
  const handleLogout = async () => {
    try { const r=await fetch('/api/logout',{method:'POST',credentials:'same-origin'}); if(r.ok)location.href='/login.html'; } catch(e){}
  };

  return (
    <div style={{width:'100vw',height:'100dvh',overflow:'hidden'}}>
      <Screen dark={dark} amount={amount} daysUntil={daysUntil} paymentDate={paymentDate} payDateObj={payDateObj} paid={paid} onPaidChange={handlePaidChange} messages={messages} pwdApproved={pwdApproved} username={username} onLogout={handleLogout}/>
    </div>
  );
}

ReactDOM.createRoot(document.body.appendChild(Object.assign(document.createElement('div'),{style:'width:100%;height:100%'}))).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Talli -- Sign In</title>
  <meta name="view-transition" content="same-origin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf7f4;
      --bg2: #f0ebe4;
      --text: #1a1612;
      --text-secondary: rgba(26,22,18,0.55);
      --text-tertiary: rgba(26,22,18,0.35);
      --border: rgba(26,22,18,0.1);
      --border2: rgba(26,22,18,0.16);
      --accent: #FF851B;
      --error: #d94f3d;
    }

    [data-theme="dark"] {
      --bg: #0d0c0b;
      --bg2: #161412;
      --text: #f2ede8;
      --text-secondary: rgba(242,237,232,0.55);
      --text-tertiary: rgba(242,237,232,0.3);
      --border: rgba(242,237,232,0.1);
      --border2: rgba(242,237,232,0.18);
      --accent: #FF851B;
      --error: #f87171;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: ui-monospace, "SF Mono", Monaco, "Cascadia Code", monospace;
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(1.25rem, 5vw, 3rem);
    }
    nav .inner {
      max-width: 640px;
      margin: 0 auto;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .wordmark {
      font-size: 1.0625rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      text-decoration: none;
    }
    .wordmark span { color: var(--accent); }

    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      border-radius: 50%;
      color: var(--text-secondary);
      transition: color 0.3s, border-color 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--text-tertiary); }
    .theme-toggle svg { width: 14px; height: 14px; }

    /* ── Page shell ── */
    .page {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 clamp(1.25rem, 5vw, 3rem);
      padding-left: max(clamp(1.25rem, 5vw, 3rem), env(safe-area-inset-left));
      padding-right: max(clamp(1.25rem, 5vw, 3rem), env(safe-area-inset-right));
      padding-bottom: max(4rem, env(safe-area-inset-bottom));
    }

    /* ── Form ── */
    .form-wrap {
      padding: clamp(3rem, 8vw, 5rem) 0 clamp(2rem, 5vw, 3rem);
      max-width: 360px;
    }

    .form-heading {
      font-family: ui-monospace, "SF Mono", Monaco, "Cascadia Code", monospace;
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 0.375rem;
    }

    .form-sub {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      margin-bottom: 2.25rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.125rem;
    }

    label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }
    input::placeholder { color: var(--text-tertiary); }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .checkbox-row label {
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      border: none;
      border-radius: 100px;
      padding: 14px 32px;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
      margin-bottom: 1rem;
    }
    .btn-submit:hover:not(:disabled) { transform: translateY(-2px) scale(1.02); }
    .btn-submit:active:not(:disabled) { transform: scale(0.98); opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.45; cursor: not-allowed; }

    .error-msg {
      display: none;
      font-size: 0.875rem;
      color: var(--error);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 0.75rem;
    }
    .success-msg {
      display: none;
      font-size: 0.875rem;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 0.75rem;
    }

    .footer-note {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      margin-top: 1.5rem;
    }
    .footer-note a {
      color: var(--text-secondary);
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 2px;
      transition: opacity 0.2s;
    }
    .footer-note a:hover { opacity: 0.5; }

    :focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }
  </style>
</head>
<body>

  <nav>
    <div class="inner">
      <a href="/" class="wordmark">talli<span>.</span></a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <div class="page">
    <div class="form-wrap">
      <h1 class="form-heading">Sign in</h1>
      <p class="form-sub">Enter your BCeID credentials.</p>

      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg">Signed in. Loading your dashboard...</div>

      <form id="login-form">
        <div class="field">
          <label for="username">BCeID Username</label>
          <input type="text" id="username" name="username" autocomplete="username" placeholder="your.username" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="rememberMe" name="rememberMe" checked>
          <label for="rememberMe">Remember me for 30 days</label>
        </div>

        <button type="submit" id="submit-btn" class="btn-submit">Sign In</button>
      </form>

      <p class="footer-note">
        <a href="/">Back to home</a> &middot; Not affiliated with the Government of BC.
      </p>
    </div>
  </div>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    const getPreferredTheme = () => {
      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    const setTheme = (theme, animate) => {
      const apply = () => {
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        } else {
          document.documentElement.removeAttribute('data-theme');
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        }
        localStorage.setItem('theme', theme);
      };
      if (animate && document.startViewTransition) {
        document.startViewTransition(apply);
      } else {
        apply();
      }
    };

    setTheme(getPreferredTheme(), false);
    themeToggle.addEventListener('click', () => {
      const current = document.documentElement.hasAttribute('data-theme') ? 'dark' : 'light';
      setTheme(current === 'dark' ? 'light' : 'dark', true);
    });

    // Skip login if session is valid
    (async () => {
      try {
        const res = await fetch('/api/session-check');
        if (res.ok) {
          const s = document.getElementById('success-msg');
          s.textContent = 'Resuming session...';
          s.style.display = 'block';
          window.location.href = '/app';
        }
      } catch {}
    })();

    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    function showError(msg, subMsg) {
      errorMsg.textContent = '';
      const line1 = document.createElement('div');
      line1.textContent = msg;
      errorMsg.appendChild(line1);
      if (subMsg) {
        const line2 = document.createElement('div');
        line2.textContent = subMsg;
        line2.style.opacity = '0.7';
        line2.style.marginTop = '4px';
        errorMsg.appendChild(line2);
      }
      errorMsg.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!username || !password) return;

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, rememberMe }),
        });
        const bodyText = await res.text();
        let data = {};
        if (bodyText) {
          try { data = JSON.parse(bodyText); } catch { data = { error: bodyText.slice(0, 140) }; }
        }

        if (res.ok && data.success) {
          successMsg.style.display = 'block';
          setTimeout(() => { window.location.href = '/app'; }, 800);
        } else {
          const msg = data.error || data.message || 'Invalid credentials. Please try again.';
          if (msg.toLowerCase().includes('temporarily unavailable')) {
            showError(
              'BC Self-Serve is temporarily unavailable.',
              'This is a government portal outage, not a Talli issue. Try again in a few minutes.'
            );
          } else {
            showError(msg);
          }
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch {
        showError('Network error. Please check your connection and try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tally -- Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    .transition-colors { transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
  </style>
</head>
<body class="min-h-dvh bg-white dark:bg-black text-gray-900 dark:text-white flex items-center justify-center p-4 transition-colors">
  <div class="w-full max-w-sm">
    <!-- Header -->
    <div class="border-b border-gray-200 dark:border-gray-800 pb-4 mb-6 flex justify-between items-center">
      <h1 class="text-xl font-medium">Tally</h1>
      <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="Toggle dark mode">
        <svg id="theme-icon-dark" class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
        <svg id="theme-icon-light" class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path>
        </svg>
      </button>
    </div>

    <!-- Form -->
    <form id="login-form" class="space-y-4">
      <div>
        <label for="username" class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-1.5">BCeID Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="your.username" required
          class="w-full bg-gray-100 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5 text-sm text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 outline-none focus:border-gray-400 dark:focus:border-gray-600 transition-colors">
      </div>

      <div>
        <label for="password" class="block text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-1.5">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required
          class="w-full bg-gray-100 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5 text-sm text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 outline-none focus:border-gray-400 dark:focus:border-gray-600 transition-colors">
      </div>

      <div class="flex items-center gap-2">
        <input type="checkbox" id="rememberMe" name="rememberMe" checked
          class="accent-gray-900 dark:accent-white w-4 h-4">
        <label for="rememberMe" class="text-sm text-gray-500 dark:text-gray-400">Remember me for 30 days</label>
      </div>

      <button type="submit" id="submit-btn"
        class="w-full bg-gray-900 dark:bg-white text-white dark:text-black rounded-lg px-4 py-2.5 text-sm font-medium hover:opacity-80 transition-opacity disabled:opacity-40 disabled:cursor-not-allowed">
        Sign In
      </button>

      <div id="error-msg" class="hidden text-red-500 dark:text-red-400 text-sm border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5"></div>
      <div id="success-msg" class="hidden text-sm text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-gray-800 rounded-lg px-3 py-2.5">Signed in. Loading your dashboard...</div>
    </form>

    <p class="text-xs text-gray-400 dark:text-gray-600 mt-6">
      <a href="/" class="hover:text-gray-600 dark:hover:text-gray-400 transition-colors">Back to home</a>
      &middot; Not affiliated with the Government of BC.
    </p>
  </div>

  <script>
    function toggleDarkMode() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
    }

    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'light' || (!saved && !prefersDark)) {
        document.documentElement.classList.remove('dark');
      }
    })();

    // Skip login if session is valid
    (async () => {
      try {
        const res = await fetch('/api/session-check');
        if (res.ok) {
          const s = document.getElementById('success-msg');
          s.textContent = 'Resuming session...';
          s.classList.remove('hidden');
          window.location.href = '/app';
        }
      } catch {}
    })();

    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    function showError(msg, subMsg) {
      errorMsg.textContent = '';
      const line1 = document.createElement('div');
      line1.textContent = msg;
      errorMsg.appendChild(line1);
      if (subMsg) {
        const line2 = document.createElement('div');
        line2.textContent = subMsg;
        line2.style.opacity = '0.7';
        line2.style.marginTop = '4px';
        errorMsg.appendChild(line2);
      }
      errorMsg.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      if (!username || !password) return;

      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, rememberMe }),
        });
        const bodyText = await res.text();
        let data = {};
        if (bodyText) {
          try { data = JSON.parse(bodyText); } catch { data = { error: bodyText.slice(0, 140) }; }
        }

        if (res.ok && data.success) {
          successMsg.classList.remove('hidden');
          setTimeout(() => { window.location.href = '/app'; }, 800);
        } else {
          const msg = data.error || data.message || 'Invalid credentials. Please try again.';
          if (msg.toLowerCase().includes('temporarily unavailable')) {
            showError(
              'BC Self-Serve is temporarily unavailable.',
              'This is a government portal outage, not a Tally issue. Try again in a few minutes.'
            );
          } else {
            showError(msg);
          }
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch {
        showError('Network error. Please check your connection and try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
